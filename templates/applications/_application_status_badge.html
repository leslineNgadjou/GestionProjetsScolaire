{% if status == 'pending' %}
  <span class="badge app-badge-status app-badge-pending">En attente</span>
{% elif status == 'accepted' %}
  <span class="badge app-badge-status app-badge-accepted">Acceptée</span>
{% elif status == 'rejected' %}
  <span class="badge app-badge-status app-badge-rejected">Refusée</span>
{% else %}
  <span class="badge app-badge-status app-badge-closed">{{ status }}</span>
{% endif %}
