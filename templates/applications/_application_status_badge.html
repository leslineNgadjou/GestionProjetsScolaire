{% if status == 'pending' %}
  <span class="badge text-bg-warning text-dark app-badge-status">En attente</span>
{% elif status == 'accepted' %}
  <span class="badge text-bg-success app-badge-status">Acceptée</span>
{% elif status == 'rejected' %}
  <span class="badge text-bg-danger app-badge-status">Refusée</span>
{% else %}
  <span class="badge text-bg-light text-dark app-badge-status">{{ status }}</span>
{% endif %}
