{% if status == 'open' %}
  <span class="badge app-badge-status app-badge-open">Ouvert</span>
{% elif status == 'closed' %}
  <span class="badge app-badge-status app-badge-closed">Fermé</span>
{% elif status == 'completed' %}
  <span class="badge app-badge-status app-badge-completed">Terminé</span>
{% else %}
  <span class="badge app-badge-status app-badge-closed">{{ status }}</span>
{% endif %}
