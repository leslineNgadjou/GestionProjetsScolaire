{% if status == 'open' %}
  <span class="badge text-bg-success app-badge-status">Ouvert</span>
{% elif status == 'closed' %}
  <span class="badge text-bg-secondary app-badge-status">Fermé</span>
{% elif status == 'completed' %}
  <span class="badge text-bg-primary app-badge-status">Terminé</span>
{% else %}
  <span class="badge text-bg-light text-dark app-badge-status">{{ status }}</span>
{% endif %}
