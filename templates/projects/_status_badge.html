{% if status == 'open' %}
  <span class="badge text-bg-success">Ouvert</span>
{% elif status == 'closed' %}
  <span class="badge text-bg-secondary">Fermé</span>
{% elif status == 'completed' %}
  <span class="badge text-bg-primary">Terminé</span>
{% else %}
  <span class="badge text-bg-light text-dark">{{ status }}</span>
{% endif %}
